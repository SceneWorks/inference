name: CI

on:
  push:
    branches: [main]
    tags: ["runtime-*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded PR runs, but never cancel a push to main or a release tag.
# github.ref is refs/heads/main for every merge, so a shared main group meant each
# merge cancelled the previous merge's in-flight run: 24 of 60 main runs cancelled
# over the sampled window, i.e. 40% of main commits carried no verdict at all
# (sc-12399, filed against the sibling SceneWorks lane — same root cause here).
# That matters most for windows-cuda-check and the macOS lanes: platform targets are
# mutually exclusive, so each lane is the ONLY thing compiling its cfg, and a killed
# run misattributes the break to the next commit and makes bisect over main useless.
#
# Main keys on github.sha, not just cancel-in-progress: GitHub allows at most ONE
# pending run per concurrency group and evicts it when a newer run queues, so a
# shared main group still drops the middle commit of a 3+ merge burst even with
# cancel-in-progress off. Per-SHA groups cannot evict each other; runs serialize on
# the runner instead. Tag builds likewise never cancel (tags are immutable — see
# CONTRIBUTING). Do NOT collapse this back to `group: ...${{ github.ref }}`.
concurrency:
  group: inference-ci-${{ github.event_name == 'pull_request' && github.ref || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    name: select affected lanes
    runs-on: ubuntu-latest
    outputs:
      workspace: ${{ steps.select.outputs.workspace }}
      contracts: ${{ steps.select.outputs.contracts }}
      candle_cpu: ${{ steps.select.outputs.candle_cpu }}
      macos_metal: ${{ steps.select.outputs.macos_metal }}
      windows_cuda: ${{ steps.select.outputs.windows_cuda }}
      supply_chain: ${{ steps.select.outputs.supply_chain }}
      docs: ${{ steps.select.outputs.docs }}
      release: ${{ steps.select.outputs.release }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - name: Expand changed paths through workspace dependencies
        id: select
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" || "$REF_TYPE" == "tag" ]]; then
            python3 scripts/ci/select_lanes.py --all --github-output "$GITHUB_OUTPUT"
          else
            python3 scripts/ci/select_lanes.py --base "$BASE_SHA" --head "$HEAD_SHA" --github-output "$GITHUB_OUTPUT"
          fi

  workspace:
    name: workspace graph invariants
    needs: changes
    if: needs.changes.outputs.workspace == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Install pinned Rust toolchain
        run: rustup show
      - name: Cache Cargo graph
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Validate normalized workspace
        run: ./scripts/check-workspace.py
      - name: Test repository tooling
        run: python3 -m unittest discover -s scripts/tests -v

  contracts:
    name: contracts + conformance testkits (Linux)
    needs: changes
    if: needs.changes.outputs.contracts == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Install pinned Rust toolchain
        run: |
          rustup show
          rustup component add rustfmt clippy
      - name: Cache Cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # gen-core was already rustfmt-clean before the history migration. The other
      # imported trees need a dedicated format-only baseline commit before this can
      # safely become `cargo fmt --all --check`.
      - name: Format established contract baseline
        run: cargo fmt -p sceneworks-gen-core -p sceneworks-gen-core-testkit --check
      - name: Clippy contracts
        run: >-
          cargo clippy --locked
          -p core-llm -p core-llm-testkit
          -p sceneworks-gen-core -p sceneworks-gen-core-testkit
          --all-targets -- -D warnings
      - name: Test contracts
        run: >-
          cargo test --locked
          -p core-llm -p core-llm-testkit
          -p sceneworks-gen-core -p sceneworks-gen-core-testkit

  candle-cpu:
    name: Candle CPU packages (Linux)
    needs: changes
    if: needs.changes.outputs.candle_cpu == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Install pinned Rust toolchain
        run: |
          rustup show
          rustup component add clippy
      - name: Cache Cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Clippy Candle packages
        run: >-
          cargo clippy --locked
          -p candle-llm -p 'candle-gen*' -p runtime-cpu
          --all-targets -- -D warnings
      - name: Reclaim Clippy artifacts before linking tests
        # The complete all-target Clippy graph and the test graph do not fit concurrently on the
        # hosted Linux runner. Clippy has already succeeded, so discard its target artifacts before
        # rebuilding the narrower lib/test profile below.
        run: cargo clean
      - name: Rustdoc Linux CPU packages
        # Public contracts and provider docs are link-heavy API surface. Keep their intra-doc graph
        # valid on the complete CPU-buildable package set. This runner has no CUDA toolkit, so it
        # cannot pass --features cuda and does not check `#[cfg(feature = "cuda")]` docs; the
        # `windows-cuda-check` lane covers that feature configuration. Metal/MLX docs remain
        # genuinely ungated: no lane documents them.
        # No reclaim step follows on purpose: unlike Clippy's --all-targets tree, this --no-deps doc
        # build's dependency artifacts are exactly the ones the lib/test profile below reuses (so the
        # test step skips recompiling the provider graph), and they stay well under the reclaimed
        # Clippy high-water mark this runner already tolerates. The -j 1 below is what bounds the lld
        # memory limit; leftover doc artifacts add no concurrent-link pressure.
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: >-
          cargo doc --locked --no-deps
          -p core-llm -p core-llm-testkit
          -p sceneworks-gen-core -p sceneworks-gen-core-testkit
          -p candle-llm -p 'candle-gen*'
          -p runtime-cpu -p runtime-catalog
      - name: Test Candle packages
        # All-target Clippy above checks every integration and real-weight target. Execute the
        # package unit/catalog suites one linker at a time: concurrently linking several provider
        # test binaries exceeds the hosted runner's memory-backed linker capacity and crashes lld
        # with SIGBUS even after the Clippy target tree has been reclaimed.
        run: cargo test --locked --lib -j 1 -p candle-llm -p 'candle-gen*' -p runtime-cpu
      - name: Test Candle LLM conformance
        run: cargo test --locked -j 1 -p candle-llm --test conformance
      - name: Test LLM-only CPU bundle
        run: cargo test --locked --no-default-features --lib -p runtime-cpu
      - name: Guard poison-tolerant shared locks
        run: bash crates/media/candle-gen/scripts/check-lock-poison.sh
      - name: Self-test the gen-core skew verdict
        run: bash crates/media/candle-gen/scripts/check-gen-core-skew.sh --self-test
      - name: Guard the real Candle gen-core graph
        run: bash crates/media/candle-gen/scripts/check-gen-core-skew.sh candle-gen

  macos-metal:
    name: MLX + Candle Metal packages (macOS)
    needs: changes
    if: needs.changes.outputs.macos_metal == 'true'
    runs-on: macos-15
    env:
      # Hosted SDK 15 cannot compile the shipping macOS 26.2 NAX path. The root
      # Cargo config is intentionally overridable so hosted CI exercises the
      # correct non-NAX path; a 26.2+ self-hosted lane is still needed for NAX.
      MACOSX_DEPLOYMENT_TARGET: "15.0"
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Toolchain versions
        run: |
          sw_vers
          xcodebuild -version
          cmake --version
      - name: Ensure Metal compiler
        run: |
          if ! xcrun --find metal >/dev/null 2>&1; then
            sudo xcodebuild -downloadComponent MetalToolchain
          fi
          xcrun metal --version || true
      - name: Install pinned Rust toolchain
        run: |
          rustup show
          rustup component add clippy
      - name: Cache Cargo and MLX native build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Clippy MLX packages
        run: >-
          cargo clippy --locked
          -p mlx-llm -p mlx-llm-server -p mlx-gen -p 'mlx-gen-*' -p runtime-macos
          --all-targets -- -D warnings
      - name: Rustdoc macOS MLX packages
        # This is the complete macOS/MLX package set the lane already builds. Keep its public
        # intra-doc graph under the same warnings-as-errors policy as the Linux and CUDA package
        # sets; NAX-specific docs remain on the separate macos-nax feature/platform lane.
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: >-
          cargo doc --locked --no-deps
          -p mlx-llm -p mlx-llm-server
          -p mlx-gen -p 'mlx-gen-*'
          -p runtime-macos
      - name: Test MLX packages
        run: >-
          cargo test --locked --lib --tests
          -p mlx-llm -p mlx-llm-server -p mlx-gen -p 'mlx-gen-*' -p runtime-macos
      - name: Test LLM-only macOS bundle
        run: cargo test --locked --no-default-features --lib -p runtime-macos
      # The metal twin of the cuda gate on `windows-cuda-check`. This was a bare `cargo check` and so
      # had two holes, both of the sc-11990 shape: it never linted `#[cfg(feature = "metal")]` code
      # (no lane passes --features metal to Clippy), and without --all-targets it did not even
      # *compile* metal-gated test targets — which is exactly where that story's break lived. The
      # cuda twin found four such breaks the moment it was switched on (sc-12379), all in cfg-gated
      # test targets no lane had ever compiled. Keep this package set aligned with the CPU and cuda
      # Clippy lanes.
      - name: Clippy Candle Metal packages
        run: >-
          cargo clippy --locked
          -p candle-llm -p 'candle-gen*'
          --all-targets --features metal -- -D warnings

  macos-nax:
    name: runtime-macos NAX (macOS 26.2, manual)
    needs: changes
    if: github.event_name == 'workflow_dispatch' && needs.changes.outputs.macos_metal == 'true'
    runs-on: [self-hosted, macOS, ARM64, nax]
    env:
      MACOSX_DEPLOYMENT_TARGET: "26.2"
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Toolchain and platform versions
        run: |
          sw_vers
          xcodebuild -version
          xcrun metal --version
          rustc --version
          cargo --version
      - name: Cache Cargo and MLX native build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Exercise MLX engine and complete runtime catalog on NAX
        run: cargo test --locked --lib -p mlx-llm -p runtime-macos
      - name: Exercise LLM-only runtime catalog on NAX
        run: cargo test --locked --no-default-features --lib -p runtime-macos

  # Non-executing gate for the CUDA feature (compile, lint, docs) — runs on every PR/push that touches
  # the lane.
  #
  # This exists because `--features cuda` code is invisible to every other lane: macOS cannot build it
  # (no CUDA toolkit) and the CPU/Linux lanes do not enable the feature, so a `#[cfg(feature = "cuda")]`
  # file can be merged in a state that does not compile, does not lint, or has broken docs, and nothing
  # notices. That is not hypothetical —
  # `candle-gen-mochi`'s `tier_parity.rs` shipped with three E0308s and was only caught by hand on the
  # CUDA box (sc-11990). `--tests` is load-bearing here: the break was in a test target, so a bare
  # `cargo build` would still have missed it.
  #
  # Deliberately `--no-run`: compiling needs nvcc + MSVC but never creates a CUDA context or allocates
  # VRAM, so this is safe to run on every PR on the shared self-hosted rig without competing for the GPU.
  # Executing the CUDA tests stays in the manual `windows-cuda` lane below.
  windows-cuda-check:
    name: Candle CUDA compile check (Windows)
    needs: changes
    if: needs.changes.outputs.windows_cuda == 'true'
    runs-on: [self-hosted, windows, cuda]
    env:
      CUDA_COMPUTE_CAP: "80"
      CUDA_PATH: "C:\\Program Files\\NVIDIA GPU Computing Toolkit\\CUDA\\v12.9"
      VCVARS: "C:\\Program Files (x86)\\Microsoft Visual Studio\\2022\\BuildTools\\VC\\Auxiliary\\Build\\vcvars64.bat"
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Select Git Bash
        shell: cmd
        run: |
          if not exist "C:\Program Files\Git\bin\bash.exe" exit /b 1
          echo C:\Program Files\Git\bin>>"%GITHUB_PATH%"
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch
        with:
          toolchain: 1.96.0
          components: clippy
      - name: Cache Cargo and CUDA objects
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Compile Candle CUDA packages and test binaries (no GPU required)
        shell: cmd
        run: |
          call "%VCVARS%"
          cargo test --locked --lib --tests -p candle-llm -p "candle-gen*" -p runtime-cuda --features cuda --no-run
      # The lint twin of the compile check above. The `candle-cpu` lane already Clippies this same
      # package set with --all-targets, but it has no CUDA toolkit and so cannot pass --features cuda:
      # every `#[cfg(feature = "cuda")]` target is invisible to it and reaches main unlinted. That is
      # not hypothetical either — a `print_literal` in candle-gen-krea's cuda-gated
      # `nvfp4_krea_dit_gpu.rs` sat red on main until it was found by hand (sc-12379). Keep this Clippy
      # package set aligned with the compile check above.
      #
      # No GPU required, same as the steps around it: Clippy type-checks the crate graph (hence vcvars
      # + nvcc for the candle-kernels build script) but creates no CUDA context and allocates no VRAM.
      - name: Clippy Candle CUDA packages (no GPU required)
        shell: cmd
        run: |
          call "%VCVARS%"
          cargo clippy --locked --all-targets -p candle-llm -p "candle-gen*" -p runtime-cuda --features cuda -- -D warnings
      # The doc twin of the compile check above. The hosted rustdoc gate cannot pass --features cuda
      # (no CUDA toolkit), so `#[cfg(feature = "cuda")]` docs need this lane. Keep this doc package
      # set aligned with the compile check above; together with the hosted gate, the CPU and CUDA
      # doc graphs are each covered (sc-12275, sc-12284).
      #
      # No GPU required, same as the compile step: rustdoc builds the dep graph (hence vcvars + nvcc)
      # but creates no CUDA context and allocates no VRAM, so it is safe on the shared self-hosted rig.
      - name: Rustdoc Candle CUDA packages (no GPU required)
        shell: cmd
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: |
          call "%VCVARS%"
          cargo doc --locked --no-deps -p candle-llm -p "candle-gen*" -p runtime-cuda --features cuda

  windows-cuda:
    name: Candle CUDA packages (Windows, manual)
    needs: changes
    if: github.event_name == 'workflow_dispatch' && needs.changes.outputs.windows_cuda == 'true'
    runs-on: [self-hosted, windows, cuda]
    env:
      CUDA_COMPUTE_CAP: "80"
      CUDA_PATH: "C:\\Program Files\\NVIDIA GPU Computing Toolkit\\CUDA\\v12.9"
      VCVARS: "C:\\Program Files (x86)\\Microsoft Visual Studio\\2022\\BuildTools\\VC\\Auxiliary\\Build\\vcvars64.bat"
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Select Git Bash
        shell: cmd
        run: |
          if not exist "C:\Program Files\Git\bin\bash.exe" exit /b 1
          echo C:\Program Files\Git\bin>>"%GITHUB_PATH%"
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy
      - name: Cache Cargo and CUDA objects
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Build Candle CUDA packages
        shell: cmd
        run: |
          call "%VCVARS%"
          cargo build --locked -p candle-llm -p "candle-gen*" -p runtime-cuda --features cuda
      - name: Test Candle CUDA packages
        shell: cmd
        run: |
          call "%VCVARS%"
          cargo test --locked --lib --tests -p candle-llm -p "candle-gen*" -p runtime-cuda --features cuda
      - name: Test LLM-only CUDA bundle
        shell: cmd
        run: |
          call "%VCVARS%"
          cargo test --locked --no-default-features --lib -p runtime-cuda

  supply-chain:
    name: dependency policy + advisories
    needs: changes
    if: needs.changes.outputs.supply_chain == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Cache cargo-deny 0.19.9
        id: cargo-deny-cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: cargo-deny-0.19.9
          add-rust-environment-hash-key: "false"
          cache-targets: "false"
          cache-bin: "true"
      - name: Install cargo-deny
        if: steps.cargo-deny-cache.outputs.cache-hit != 'true'
        run: cargo install cargo-deny --locked --version 0.19.9
      - name: Check advisories, licenses, bans, and sources
        run: cargo deny --locked check advisories bans licenses sources

  docs:
    name: repository documentation
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Check local documentation links
        run: python3 scripts/check_docs.py

  release-metadata:
    name: runtime manifest + SPDX SBOM
    needs: changes
    if: needs.changes.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Cache Cargo graph
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Build dry-run release metadata
        run: >-
          python3 scripts/release/build_release.py
          --tag runtime-2000.01.0-rc.0 --skip-archive
      - name: Verify manifest, checksums, and SBOM graph
        run: python3 scripts/release/verify_release.py dist/release --skip-smoke

  release-artifacts:
    name: tagged source archive + external smoke
    needs: [changes, release-metadata]
    if: startsWith(github.ref, 'refs/tags/runtime-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Cache Cargo graph
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Build tagged source bundle
        run: python3 scripts/release/build_release.py --tag "$GITHUB_REF_NAME"
      - name: Verify and consume source bundle externally
        run: python3 scripts/release/verify_release.py dist/release
      - name: Upload immutable release inputs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ github.ref_name }}-source
          path: dist/release/
          if-no-files-found: error
