name: Real-weight validation

on:
  schedule:
    - cron: "17 7 * * 0"
  workflow_dispatch:
    inputs:
      profile:
        description: Real-weight profile to run
        type: choice
        required: true
        default: all
        options: [all, llm, media, audio]

permissions:
  contents: read

concurrency:
  group: inference-real-weights-${{ github.ref }}
  cancel-in-progress: false

jobs:
  mlx-llm:
    name: MLX LLM real weights
    if: github.event_name == 'schedule' || inputs.profile == 'all' || inputs.profile == 'llm'
    runs-on: [self-hosted, macOS, ARM64, real-weights]
    env:
      MLX_LLM_TEST_MODEL: ${{ vars.MLX_LLM_TEST_MODEL }}
      MLX_LLM_QWEN3_MODEL: ${{ vars.MLX_LLM_QWEN3_MODEL }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Toolchain versions
        run: rustc --version && cargo --version
      - name: Materialize and verify immutable snapshots
        run: |
          python3 -m pip install --disable-pip-version-check --target "$RUNNER_TEMP/huggingface-hub" "huggingface_hub==1.20.1"
          PYTHONPATH="$RUNNER_TEMP/huggingface-hub" python3 scripts/release/ensure_model_snapshot.py --model smollm2-135m-instruct --snapshot "$MLX_LLM_TEST_MODEL"
          PYTHONPATH="$RUNNER_TEMP/huggingface-hub" python3 scripts/release/ensure_model_snapshot.py --model qwen3-0.6b --snapshot "$MLX_LLM_QWEN3_MODEL"
      - name: Run representative conformance
        run: |
          cargo test --locked -p mlx-llm --test conformance real_model_passes_core_llm_conformance -- --ignored --nocapture
          cargo test --locked -p mlx-llm --test conformance real_qwen3_passes_core_llm_conformance -- --ignored --nocapture

  mlx-media:
    name: MLX media real weights
    if: github.event_name == 'schedule' || inputs.profile == 'all' || inputs.profile == 'media'
    runs-on: [self-hosted, macOS, ARM64, real-weights]
    env:
      ZIMAGE_SNAPSHOT: ${{ vars.ZIMAGE_SNAPSHOT }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Toolchain versions
        run: rustc --version && cargo --version
      - name: Materialize and verify immutable snapshot
        run: |
          python3 -m pip install --disable-pip-version-check --target "$RUNNER_TEMP/huggingface-hub" "huggingface_hub==1.20.1"
          PYTHONPATH="$RUNNER_TEMP/huggingface-hub" python3 scripts/release/ensure_model_snapshot.py --model z-image-turbo --snapshot "$ZIMAGE_SNAPSHOT"
      - name: Run provider conformance
        run: >-
          cargo test --locked -p mlx-gen-z-image --test conformance
          z_image_turbo_satisfies_gen_core_contract -- --ignored --nocapture

  candle-audio:
    name: Candle audio real weights
    if: github.event_name == 'schedule' || inputs.profile == 'all' || inputs.profile == 'audio'
    runs-on: [self-hosted, macOS, ARM64, real-weights]
    env:
      KOKORO_SNAPSHOT: ${{ vars.KOKORO_SNAPSHOT }}
      MOSS_SFX_SNAPSHOT: ${{ vars.MOSS_SFX_SNAPSHOT }}
      ACESTEP_SNAPSHOT: ${{ vars.ACESTEP_SNAPSHOT }}
      CHATTERBOX_VE_SNAPSHOT: ${{ vars.CHATTERBOX_VE_SNAPSHOT }}
      CHATTERBOX_SNAPSHOT: ${{ vars.CHATTERBOX_SNAPSHOT }}
      OPENVOICE_V2_SNAPSHOT: ${{ vars.OPENVOICE_V2_SNAPSHOT }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Toolchain versions
        run: rustc --version && cargo --version
      - name: Materialize and verify immutable snapshots
        run: |
          python3 -m pip install --disable-pip-version-check --target "$RUNNER_TEMP/huggingface-hub" "huggingface_hub==1.20.1"
          PYTHONPATH="$RUNNER_TEMP/huggingface-hub" python3 scripts/release/ensure_model_snapshot.py --model kokoro-82m --snapshot "$KOKORO_SNAPSHOT"
          PYTHONPATH="$RUNNER_TEMP/huggingface-hub" python3 scripts/release/ensure_model_snapshot.py --model moss-soundeffect-v2 --snapshot "$MOSS_SFX_SNAPSHOT"
          PYTHONPATH="$RUNNER_TEMP/huggingface-hub" python3 scripts/release/ensure_model_snapshot.py --model acestep-v15-turbo --snapshot "$ACESTEP_SNAPSHOT"
          PYTHONPATH="$RUNNER_TEMP/huggingface-hub" python3 scripts/release/ensure_model_snapshot.py --model chatterbox-ve --snapshot "$CHATTERBOX_VE_SNAPSHOT"
          PYTHONPATH="$RUNNER_TEMP/huggingface-hub" python3 scripts/release/ensure_model_snapshot.py --model chatterbox --snapshot "$CHATTERBOX_SNAPSHOT"
          PYTHONPATH="$RUNNER_TEMP/huggingface-hub" python3 scripts/release/ensure_model_snapshot.py --model openvoice-v2 --snapshot "$OPENVOICE_V2_SNAPSHOT"
      - name: Run provider conformance
        run: |
          cargo test --locked -p candle-audio-kokoro --test conformance kokoro_conformance -- --ignored --nocapture
          cargo test --locked -p candle-audio-kokoro --test conformance kokoro_wav_conformance -- --ignored --nocapture
          cargo test --locked -p candle-audio-moss-sfx --test conformance moss_sfx_conformance -- --ignored --nocapture
          cargo test --locked -p candle-audio-moss-sfx --test conformance moss_sfx_wav_conformance -- --ignored --nocapture
          # ACE-Step 1.5 music/song (sc-12842): the flow-matching DiT + Oobleck VAE producing a
          # non-degenerate, rhythmic stereo mix (frame-energy variation, broadband spectrum, beat).
          cargo test --locked -p candle-audio-acestep --test conformance acestep_conformance -- --ignored --nocapture
          cargo test --locked -p candle-audio-acestep --test conformance acestep_music_wav_conformance -- --ignored --nocapture
          # Chatterbox voice embedder (sc-12844): the sc-12838 release gate. Uses the Kokoro
          # snapshot above for the distinct reference voices it embeds.
          cargo test --locked -p candle-audio-chatterbox-ve --test conformance chatterbox_ve_discriminates_speakers -- --ignored --nocapture
          cargo test --locked -p candle-audio-chatterbox-ve --test conformance chatterbox_ve_wav_conformance -- --ignored --nocapture
          # OpenVoice V2 voice conversion (sc-13223): the sc-12839 release gate. Converts a Kokoro
          # source clip toward a DIFFERENT Kokoro target voice; the timbre shift is measured with
          # chatterbox_ve above.
          cargo test --locked -p candle-audio-openvoice --test conformance openvoice_v2_converts_toward_the_target_voice -- --ignored --nocapture
          cargo test --locked -p candle-audio-openvoice --test conformance openvoice_v2_is_deterministic -- --ignored --nocapture
          # Chatterbox clone-TTS (sc-13222): the T3 speech-token LM stage on real t3_cfg.safetensors
          # weights — a valid, non-degenerate, voice-responsive token sequence, plus the honest
          # S3Gen boundary. The full sc-12838 clone-WAV gate is deferred to the S3Gen slice.
          cargo test --locked -p candle-audio-chatterbox --test conformance chatterbox_t3_produces_valid_speech_tokens -- --ignored --nocapture
          cargo test --locked -p candle-audio-chatterbox --test conformance chatterbox_t3_responds_to_the_reference_voice -- --ignored --nocapture
          cargo test --locked -p candle-audio-chatterbox --test conformance chatterbox_generate_stops_honestly_at_the_s3gen_boundary -- --ignored --nocapture
      # Regression fixture (sc-12854): the validation harness's committed metric envelope +
      # PCM repeatability hash; this runner IS the fixture's canonical platform
      # (macos/aarch64), so the exact-hash check gates here.
      - name: Run regression fixture
        run: cargo test --locked -p candle-audio-kokoro --test regression kokoro_regression_fixture -- --ignored --nocapture

  candle-llm:
    name: Candle LLM real weights (CUDA)
    if: github.event_name == 'schedule' || inputs.profile == 'all' || inputs.profile == 'llm'
    runs-on: [self-hosted, windows, cuda, real-weights]
    env:
      CANDLE_LLM_TEST_MODEL: ${{ vars.CANDLE_LLM_TEST_MODEL }}
      CANDLE_LLM_QWEN3_MODEL: ${{ vars.CANDLE_LLM_QWEN3_MODEL }}
      CUDA_COMPUTE_CAP: "80"
      CUDA_PATH: "C:\\Program Files\\NVIDIA GPU Computing Toolkit\\CUDA\\v12.9"
      VCVARS: "C:\\Program Files (x86)\\Microsoft Visual Studio\\2022\\BuildTools\\VC\\Auxiliary\\Build\\vcvars64.bat"
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Select Git Bash
        shell: cmd
        run: |
          if not exist "C:\Program Files\Git\bin\bash.exe" exit /b 1
          echo C:\Program Files\Git\bin>>"%GITHUB_PATH%"
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy
      - name: Materialize and verify immutable snapshots
        shell: cmd
        run: |
          python -m pip install --disable-pip-version-check --target "%RUNNER_TEMP%\huggingface-hub" "huggingface_hub==1.20.1"
          set "PYTHONPATH=%RUNNER_TEMP%\huggingface-hub"
          python scripts/release/ensure_model_snapshot.py --model smollm2-135m-instruct --snapshot "%CANDLE_LLM_TEST_MODEL%"
          python scripts/release/ensure_model_snapshot.py --model qwen3-0.6b --snapshot "%CANDLE_LLM_QWEN3_MODEL%"
      - name: Run representative conformance
        shell: cmd
        run: |
          call "%VCVARS%"
          cargo test --locked -p candle-llm --features cuda --test conformance real_model_passes_core_llm_conformance -- --ignored --nocapture
          cargo test --locked -p candle-llm --features cuda --test conformance qwen3_passes_core_llm_conformance -- --ignored --nocapture

  candle-media:
    name: Candle media real weights (CUDA)
    if: github.event_name == 'schedule' || inputs.profile == 'all' || inputs.profile == 'media'
    runs-on: [self-hosted, windows, cuda, real-weights]
    env:
      Z_IMAGE_SNAPSHOT: ${{ vars.Z_IMAGE_SNAPSHOT }}
      CUDA_COMPUTE_CAP: "80"
      CUDA_PATH: "C:\\Program Files\\NVIDIA GPU Computing Toolkit\\CUDA\\v12.9"
      VCVARS: "C:\\Program Files (x86)\\Microsoft Visual Studio\\2022\\BuildTools\\VC\\Auxiliary\\Build\\vcvars64.bat"
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Select Git Bash
        shell: cmd
        run: |
          if not exist "C:\Program Files\Git\bin\bash.exe" exit /b 1
          echo C:\Program Files\Git\bin>>"%GITHUB_PATH%"
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy
      - name: Materialize and verify immutable snapshot
        shell: cmd
        run: |
          python -m pip install --disable-pip-version-check --target "%RUNNER_TEMP%\huggingface-hub" "huggingface_hub==1.20.1"
          set "PYTHONPATH=%RUNNER_TEMP%\huggingface-hub"
          python scripts/release/ensure_model_snapshot.py --model z-image-turbo --snapshot "%Z_IMAGE_SNAPSHOT%"
      - name: Run provider conformance
        shell: cmd
        run: |
          call "%VCVARS%"
          cargo test --locked -p candle-gen-z-image --features cuda --test conformance z_image_conformance -- --ignored --nocapture
