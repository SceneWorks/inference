[package]
name = "candle-gen"
version = "0.0.0"
edition = "2021"
description = "Rust-native generative image & video model inference on candle (CPU/Metal/CUDA); Windows/CUDA sibling of mlx-gen (work in progress; scaffold)."
license = "Apache-2.0"
repository = "https://github.com/michaeltrefry/candle-gen"
keywords = ["candle", "cuda", "diffusion", "inference", "generative"]
categories = ["science"]
readme = "../README.md"

[dependencies]
# Shared pins live in [workspace.dependencies] (mirrors mlx-gen F-151).
sceneworks-gen-core = { workspace = true }
candle-core = { workspace = true }
candle-nn = { workspace = true }
thiserror = { workspace = true }
# Training harness (epic 5164 / sc-5165). `safetensors` is candle's own version (0.7) so the `View`
# impl candle-core provides for `Tensor` applies — used to write PEFT/LoKr adapters *with metadata*
# (candle-core's own save passes `None`). `rand`/`rand_distr` seed deterministic, launch-portable
# adapter-factor init (the sc-3673 philosophy applied to LoRA `A`); `image` decodes the dataset.
safetensors = "0.7"
# Parse the PEFT/diffusers `lora_adapter_metadata` JSON blob (sc-5374) in `train::lora` so the
# inference adapter merge recovers `lora_alpha`/`r` when a file ships no per-target `.alpha` tensor.
serde_json = { workspace = true }
rand = { workspace = true }
rand_distr = { workspace = true }
image = { version = "0.25", default-features = false, features = ["png", "jpeg"] }

[features]
# Default works on Mac with NO extra features: candle-core defaults to the CPU backend.
default = []
# Apple Metal GPU backend — builds on Mac. NOT in `default` so the plain `cargo check` stays CPU.
metal = ["candle-core/metal", "candle-nn/metal"]
# NVIDIA CUDA backend (Windows target). MUST NOT be in `default` — it needs the CUDA toolkit and
# will not build on Mac. All cuda-only code is gated behind `#[cfg(feature = "cuda")]`.
cuda = ["candle-core/cuda", "candle-nn/cuda"]
# Flash-Attention kernels (Windows/CUDA only). For now this just implies `cuda`; the real fused
# kernels need the separate `candle-flash-attn` crate, wired in a later slice on the Windows box.
flash-attn = ["cuda"]
