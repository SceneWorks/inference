[package]
name = "candle-gen-qwen-image"
version = "0.0.0"
edition = "2021"
description = "Qwen-Image provider crate for candle-gen — the Windows/CUDA sibling of mlx-gen-qwen-image."
license = "Apache-2.0"
repository = "https://github.com/michaeltrefry/candle-gen"
keywords = ["candle", "cuda", "diffusion", "qwen-image", "inference"]
categories = ["science"]

[dependencies]
candle-gen = { path = "../candle-gen" }
inventory = { workspace = true }
# Deterministic CPU-seeded initial noise (sc-3673 parity).
rand = { workspace = true }
rand_distr = { workspace = true }
serde_json = "1"
# Read adapter `.safetensors` header metadata (`networkType`/`rank`/`alpha` + the diffusers
# `lora_adapter_metadata` blob) for the inference LoRA/LoKr merge (sc-6220); candle's tensor loader
# drops the `__metadata__`. Already in the workspace lock via candle.
safetensors = "0.7"

[features]
default = []
metal = ["candle-gen/metal"]
cuda = ["candle-gen/cuda"]
flash-attn = ["candle-gen/flash-attn"]

[dev-dependencies]
image = { version = "0.25", default-features = false, features = ["png"] }
sceneworks-gen-core-testkit = { workspace = true }
