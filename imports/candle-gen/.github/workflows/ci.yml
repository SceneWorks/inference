name: CI

on:
  push:
    branches: [main]
  pull_request:

# Supersede in-flight runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The default (CPU) build works on any platform. macOS additionally exercises the `metal`
  # feature. This lane runs fmt + clippy + check + test + the gen-core skew gate's self-test.
  build:
    name: fmt + clippy + check + test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust (pinned by rust-toolchain.toml)
        # No `@stable` — that would ignore the pin. `rustup show` installs the channel named in
        # rust-toolchain.toml (its components come with it); the explicit add is idempotent.
        run: |
          rustup show
          rustup component add rustfmt clippy
          rustc --version

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy (default / CPU)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Check (default / CPU)
        run: cargo check --workspace

      - name: Check (Metal backend)
        if: matrix.os == 'macos-15'
        run: cargo check --workspace --features metal

      - name: Test (default / CPU)
        run: cargo test --workspace

      - name: gen-core skew gate (self-test)
        run: bash scripts/check-gen-core-skew.sh --self-test

      - name: gen-core skew gate (real graph)
        run: bash scripts/check-gen-core-skew.sh

  # Windows + CUDA lane. Runs on a SELF-HOSTED runner labelled [self-hosted, windows, cuda] with the
  # toolchain documented in the README's packaging section: CUDA 12.9 toolkit (nvcc) + VS 2022 v143
  # (MSVC 14.4x) Build Tools. GitHub-hosted runners have no GPU and no CUDA toolkit, so this lane is
  # skipped on forks (the runner label only exists on this repo).
  #
  # Packaging model (sc-3676): candle 0.10.2 compiles its kernels to **PTX**, not a SASS fatbin, and
  # cudaforge reads CUDA_COMPUTE_CAP as a SINGLE value (a `;`-list does not parse). So portability is
  # achieved with a **baseline virtual arch** — CUDA_COMPUTE_CAP=80 emits compute_80 PTX that the
  # driver JIT-compiles to the runtime GPU's SASS (one binary runs on sm_80 Ampere → sm_120 Blackwell).
  # Keep this in lockstep with README "Packaging" and scripts/package-cuda.ps1.
  windows-cuda:
    name: build + test (Windows / CUDA, baseline PTX sm_80)
    # Skip on forks — only this repo has the labelled self-hosted GPU runner.
    if: github.repository == 'michaeltrefry/candle-gen'
    runs-on: [self-hosted, windows, cuda]
    env:
      # Baseline virtual arch: compute_80 PTX, driver-JIT'd up to the runtime GPU. NOT a hardware pin.
      CUDA_COMPUTE_CAP: "80"
      # Toolchain locations on the runner. Override here (not in code) if the runner layout changes —
      # this keeps the build reproducible without a hand-set local shell.
      CUDA_PATH: "C:\\Program Files\\NVIDIA GPU Computing Toolkit\\CUDA\\v12.9"
      VCVARS: "C:\\Program Files (x86)\\Microsoft Visual Studio\\2022\\BuildTools\\VC\\Auxiliary\\Build\\vcvars64.bat"
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust (pinned by rust-toolchain.toml)
        run: |
          rustup show
          rustc --version

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # nvcc emits one PTX per kernel under the candle-kernels build dir; cudaforge skips recompiling
      # when the .ptx is newer than its .cu, so this caches across runs. cmd (not pwsh) sources vcvars
      # in-process and runs cargo in the same environment — no MSYS `cmd /c` path mangling.
      - name: Build (CUDA, baseline PTX)
        shell: cmd
        run: |
          call "%VCVARS%"
          cargo build --workspace --features cuda

      - name: Test (CUDA)
        shell: cmd
        run: |
          call "%VCVARS%"
          cargo test --workspace --features cuda
