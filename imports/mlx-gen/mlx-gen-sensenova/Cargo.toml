[package]
name = "mlx-gen-sensenova"
version = "0.0.0"
edition = "2021"
description = "SenseNova-U1 (NEO-Unify) provider crate for mlx-gen — a unified AR LLM + flow-matching image generator."
license = "Apache-2.0"
repository = "https://github.com/michaeltrefry/mlx-gen"
keywords = ["mlx", "apple-silicon", "sensenova", "multimodal", "inference"]
categories = ["science"]

[dependencies]
mlx-gen = { path = ".." }
# config.json parsing (matches the sdxl/wan/ltx/flux2 provider convention: serde_json::Value, no derive).
serde_json = "1"

# NOTE: `mlx-rs` (matching the core crate's pinned binding) and `inventory` (link-time
# self-registration) are added when the forward path + `Generator` impl land (sc-3182+/sc-3194).
# sc-3181 is config + weight-map foundation only, so they would be unused deps here.
