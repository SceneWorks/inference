[package]
name = "mlx-gen-face"
version = "0.0.0"
edition = "2021"
description = "Native MLX face-analysis provider crate for mlx-gen (ArcFace iresnet100 / SCRFD / BiSeNet / alignment)."
license = "Apache-2.0"
repository = "https://github.com/michaeltrefry/mlx-gen"
keywords = ["mlx", "apple-silicon", "arcface", "face", "inference"]
categories = ["science"]

[dependencies]
mlx-gen = { path = ".." }
# Must match the core crate's MLX binding exactly (shared `Array` type). See root Cargo.toml.
mlx-rs = { package = "pmetal-mlx-rs", git = "https://github.com/michaeltrefry/mlx-rs", rev = "e59ffd88014340e6a49b26de95446b8b76a57932" }
# Link-time self-registration into mlx-gen's model registry (used once the unified FaceAnalysis
# API lands in sc-3085; the ArcFace network itself does not need it).
inventory = "0.3"
