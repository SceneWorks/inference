[package]
name = "mlx-gen-mochi"
version = "0.0.0"
edition = "2021"
description = "Complete Mochi 1 provider for mlx-gen: masked T5-XXL conditioning, MMDiT denoising, scheduling, AsymmVAE decoding, snapshot conversion, and explicit registration."
license = "Apache-2.0"
repository = "https://github.com/michaeltrefry/mlx-gen"
keywords = ["mlx", "apple-silicon", "mochi", "video", "inference"]
categories = ["science"]

[dependencies]
mlx-gen = { path = ".." }
# Reuse the T5-XXL (t5-v1.1-xxl) text encoder type — Mochi conditions on the identical encoder FLUX /
# Chroma use (the masked-encode path, like Chroma).
mlx-gen-flux = { path = "../mlx-gen-flux" }
# Must match the core crate's MLX binding exactly (shared `Array` type). See root Cargo.toml.
mlx-rs = { workspace = true }
# Parse the diffusers `vae/config.json` (per-channel latents_mean/std, block/expansion structure).
serde_json = { workspace = true }

[dev-dependencies]
# PNG dump of the Rust VAE decode for visual inspection in the parity test.
image = { workspace = true }
