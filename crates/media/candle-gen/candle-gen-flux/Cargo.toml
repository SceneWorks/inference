[package]
name = "candle-gen-flux"
version = "0.0.0"
edition = "2021"
description = "FLUX.1 (schnell + dev) provider crate for candle-gen — the Windows/CUDA sibling of mlx-gen-flux."
license = "Apache-2.0"
repository = "https://github.com/michaeltrefry/candle-gen"
keywords = ["candle", "cuda", "diffusion", "flux", "inference"]
categories = ["science"]

[dependencies]
# Core crate — re-exports gen_core + candle, so this provider links exactly one gen-core / candle
# build (single resolution; see scripts/check-gen-core-skew.sh).
candle-gen = { path = "../candle-gen" }
# NVIDIA PiD optional super-resolving decoder (epic 7840 / sc-7853): FLUX's own `flux` 16-ch
# latent-space student (4× SR). Wired behind `req.use_pid` (default off → the byte-exact native FLUX
# AutoEncoder decode).
candle-gen-pid = { path = "../candle-gen-pid" }
# FLUX building blocks: the `flux` model (DiT) + `autoencoder` (VAE) read the original
# black-forest-labs checkpoint layout directly; `t5` (T5-XXL) and `clip` (CLIP-L) are the dual text
# encoders. Backend features are passed through below so it shares candle-gen's exact candle build.
candle-transformers = { workspace = true }
# Reused IP-Adapter infrastructure (sc-5872): the CLIP ViT image tower (`ClipVisionEncoder` /
# `VisionConfig::vit_l_14`) and `preprocess_clip_image_sized` (the shared CLIP image preprocessing).
# (The backend-generic `Weights` loader moved to the `candle-gen` core crate in F-060/sc-9044, so it is
# no longer a reason for this dep.) Backend features are forwarded below so flux + sdxl share ONE candle
# build (the single-rev skew gate).
candle-gen-sdxl = { path = "../candle-gen-sdxl" }
# candle-transformers' `flux::model::Flux` exposes no per-double-block IP-injection seam (all fields
# private), so sc-5872 vendors + forks the FLUX DiT (`ip_dit.rs`) to add the XLabs decoupled-cross-attn
# K/V seam — exactly the "vendor the model to get a seam" move candle-gen-sdxl made for the UNet. Direct
# candle-core/candle-nn deps (same workspace pin as candle-transformers, no dup) let the fork copy the
# upstream model verbatim. The stock txt2img path keeps using candle-transformers' `Flux` untouched.
candle-core = { workspace = true }
candle-nn = { workspace = true }
# Prompt tokenization for the dual encoders. FLUX has no chat template (plain encode), so this uses
# the HF `tokenizers` runtime directly (the candle reference path), NOT gen-core's chat-template
# `TextTokenizer` — the T5 `tokenizer.json` comes from the snapshot, CLIP's is vendored (see below).
tokenizers = { workspace = true }
# Deterministic CPU-seeded initial noise (sc-3673 parity) — NOT candle's CUDA `randn`.
rand = { workspace = true }
rand_distr = { workspace = true }
# Parse the snapshot's `text_encoder_2/config.json` into candle's `t5::Config` (same path the candle
# `flux` example uses). Matches the serde_json major candle's own tree pulls in (no dup).
serde_json = "1"

[features]
# Pass the backend selection through to the core crate AND candle-transformers so a downstream
# `--features metal`/`cuda` on this provider crate selects the matching candle backend everywhere.
default = []
metal = ["candle-gen/metal", "candle-transformers/metal", "candle-gen-sdxl/metal", "candle-gen-pid/metal"]
cuda = ["candle-gen/cuda", "candle-transformers/cuda", "candle-gen-sdxl/cuda", "candle-gen-pid/cuda"]

[dev-dependencies]
# `examples/flux-txt2img.rs` smoke driver only — encode the produced `gen_core::Image` (RGB8) to PNG so a
# real GPU run can be eyeballed. Not a library dependency (the worker owns asset writes).
image = { version = "0.25", default-features = false, features = ["png"] }
# gen-core conformance suite (sc-4481): drives this provider through the public Generator contract
# (cancel / progress / seed-determinism / capability honesty). Pinned to the SAME gen-core rev the
# workspace pins (e9c569c2) so it shares one contract build. Used by tests/conformance.rs (cuda-gated,
# #[ignore]d — it runs a real generate, so it needs weights + GPU).
sceneworks-gen-core-testkit = { workspace = true }
# Shared test-support helpers (sc-9055 / F-069: candle_gen::testkit).
candle-gen = { path = "../candle-gen", features = ["testkit"] }
