[package]
name = "candle-gen-ideogram"
version = "0.0.0"
edition = "2021"
description = "Ideogram 4 provider crate for candle-gen — the Windows/CUDA sibling of mlx-gen-ideogram."
license = "Apache-2.0"
repository = "https://github.com/michaeltrefry/candle-gen"
keywords = ["candle", "cuda", "diffusion", "ideogram", "inference"]
categories = ["science"]

[dependencies]
candle-gen = { path = "../candle-gen" }
# Ideogram's VAE is the FLUX.2 `AutoencoderKLFlux2` (32-ch, 2×2 patchify, identity scaling) — reuse
# `candle-gen-flux2`'s `Flux2Vae` verbatim, exactly as `mlx-gen-ideogram` reuses `mlx-gen-flux2`.
candle-gen-flux2 = { path = "../candle-gen-flux2" }
# NVIDIA PiD optional super-resolving decoder (epic 7840 / sc-7853): Ideogram 4 reuses the FLUX.2 VAE,
# so it shares the `flux2` PiD latent-space student (its DiT packs the 128 channels in a DIFFERENT
# `(ph,pw,c)` order, so the decode branch reconstructs the FLUX.2-canonical packed latent). Wired
# behind `req.use_pid` (default off → the byte-exact native `Flux2Vae::decode_latent`).
candle-gen-pid = { path = "../candle-gen-pid" }
# Deterministic CPU-seeded initial noise (sc-3673 parity).
rand = { workspace = true }
rand_distr = { workspace = true }
serde_json = "1"
# Read adapter `.safetensors` header metadata for the bundled TurboTime LoRA merge (turbo path).
safetensors = "0.7"

[features]
default = []
metal = ["candle-gen/metal", "candle-gen-flux2/metal", "candle-gen-pid/metal"]
cuda = ["candle-gen/cuda", "candle-gen-flux2/cuda", "candle-gen-pid/cuda"]

[dev-dependencies]
candle-gen = { path = "../candle-gen", features = ["testkit"] }
image = { version = "0.25", default-features = false, features = ["png"] }
sceneworks-gen-core-testkit = { workspace = true }
