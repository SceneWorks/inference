[package]
name = "candle-gen-sana"
version = "0.0.0"
edition = "2021"
description = "SANA (NVlabs) provider crate for candle-gen — gating spike sc-11777: the DC-AE f32 deep-compression image decoder + the EfficientViT GLU ReLU-linear-attention block (the shared hard primitive the SANA Linear-DiT trunk reuses). Windows/CUDA + Linux sibling of mlx-gen-sana (mlx-gen #612)."
license = "Apache-2.0"
repository = "https://github.com/michaeltrefry/candle-gen"
keywords = ["candle", "cuda", "diffusion", "sana", "autoencoder"]
categories = ["science"]

[dependencies]
# The shared candle backend + commons (device/dtype seam, `Weights`, `CandleError → gen_core::Error`
# bridge). Re-exports `candle_core` / `candle_nn` / `gen_core`, so the SANA modules resolve the SAME
# candle build + gen-core rev the provider crates they wire into resolve.
candle-gen = { path = "../candle-gen" }
# SANA text conditioning REUSES PiD's native gemma-2-2b-it CHI caption encoder (`CaptionEncoder`,
# `Gemma2`) — SANA and PiD share the exact same text-conditioning lineage (sc-11779, mirrors
# mlx-gen #614). Only the CHI prompt text differs; the Gemma-2 forward + token-selection policy live
# once in candle-gen-pid and are wired here via `CaptionEncoder::with_chi_prompt`. No encoder body is
# copied.
candle-gen-pid = { path = "../candle-gen-pid" }
# Launch-portable seeded latent noise draw (the same CPU `StdRng` the shared `candle_gen::seed`
# helpers use) — the pipeline seeds the DC-AE latent here.
rand = { workspace = true }

[dev-dependencies]
# The txt2img example fetches the WHOLE SANA HF repo snapshot (model-download convention — every
# sibling, not a pinned allow-list) into the HF cache before loading.
hf-hub = { workspace = true }
# Shared test-support helpers (PPM IO / cosine / HF-cache resolution / GPU peak-VRAM probe) behind
# candle-gen's `testkit` feature (mirrors candle-gen-pid / candle-gen-krea test IO).
candle-gen = { path = "../candle-gen", features = ["testkit"] }
image = { version = "0.25", default-features = false, features = ["png"] }

[features]
default = []
# Apple Metal GPU backend (Mac) — forwarded to the candle backend. Not in `default`.
metal = ["candle-gen/metal"]
# NVIDIA CUDA backend (Windows/Linux target) — forwarded to the candle backend. Not in `default`.
cuda = ["candle-gen/cuda"]
