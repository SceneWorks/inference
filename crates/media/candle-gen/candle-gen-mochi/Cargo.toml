[package]
name = "candle-gen-mochi"
version = "0.0.0"
edition = "2021"
description = "Mochi 1 (genmo/mochi-1-preview) text-to-video provider crate for candle-gen — the Windows/CUDA sibling of mlx-gen-mochi."
license = "Apache-2.0"
repository = "https://github.com/michaeltrefry/candle-gen"
keywords = ["candle", "cuda", "video", "mochi", "inference"]
categories = ["science"]

[dependencies]
candle-gen = { path = "../candle-gen" }
# Mochi conditions on the same google/t5-v1.1-xxl encoder FLUX reuses; the masked T5 encode is run
# through the shared `candle_gen_flux::PackedT5Encoder` stack (packed-detect QLinear/QEmbedding → dense
# bf16 diffusers shards load unchanged), extended here with the tokenizer key-padding mask Mochi's
# `_get_t5_prompt_embeds` applies. Everything Mochi-specific (learned 3-D RoPE, dual-stream AsymmDiT,
# linear-quadratic scheduler, AsymmVAE causal-conv decoder) is ported here on candle-core/candle-nn
# (candle ships no conv3d — see `conv3d`).
candle-gen-flux = { path = "../candle-gen-flux" }
# The vendored fast-tokenizer JSON (google t5-v1.1-xxl) is loaded from memory.
tokenizers = { workspace = true }
# Read the T5 `model.safetensors.index.json` weight_map (the index-filtered shard load) + `vae/config.json`.
serde_json = { workspace = true }
# Deterministic CPU-seeded initial noise (sc-3673 parity; the same StdRng draw the LTX/wan crates use).
rand = { workspace = true }
# Frame → RGB `Image` conversion at the pipeline tail.
image = { version = "0.25", default-features = false, features = ["png"] }

[features]
default = []
# Pass the backend selection through to the core crate AND the reused flux stack so a downstream
# `--features metal`/`cuda` on this provider crate selects the matching candle backend everywhere.
metal = ["candle-gen/metal", "candle-gen-flux/metal"]
cuda = ["candle-gen/cuda", "candle-gen-flux/cuda"]

[dev-dependencies]
# Load the A1 real-weight goldens (gitignored under ../../mlx-gen/tools/golden) in the CUDA parity tier.
candle-gen = { path = "../candle-gen", features = ["testkit"] }
