[package]
name = "candle-gen-seedvr2"
version = "0.0.0"
edition = "2021"
description = "SeedVR2 provider crate for candle-gen — the Windows/CUDA sibling of mlx-gen-seedvr2: a one-step diffusion-transformer + 3D causal video VAE super-resolution upscaler (image; video lands in sc-5926)."
license = "Apache-2.0"
repository = "https://github.com/michaeltrefry/candle-gen"
keywords = ["candle", "cuda", "seedvr2", "upscale", "inference"]
categories = ["science"]

[dependencies]
candle-gen = { path = "../candle-gen" }
# Fixed-algorithm CPU RNG for deterministic, launch-portable one-step noise (matches the svd/wan
# convention) — NOT candle's CUDA set_seed. `StdRng` (ChaCha) is reproducible across launches.
rand = { workspace = true }
rand_distr = { workspace = true }
# Data-parallel post-decode color correction (sc-11232 / F-094): the wavelet blurs, LAB transfer and
# histogram matches were a single-threaded host hot loop serialized against the GPU pipeline. Rayon
# spreads the per-row / per-pixel / per-channel work across cores with per-element numerics unchanged.
rayon = "1"

[features]
default = []
metal = ["candle-gen/metal"]
cuda = ["candle-gen/cuda"]

[dev-dependencies]
sceneworks-gen-core-testkit = { workspace = true }
# CUDA smoke harness (tests/cuda_smoke.rs): save the upscaled result as a PNG to eyeball.
image = { version = "0.25", default-features = false, features = ["png"] }
