[package]
name = "mlx-llm-server"
version = "0.0.0"
edition = "2021"
description = "Example OpenAI-compatible HTTP server (chat completions + SSE) on the mlx-llm engine."
license = "Apache-2.0"
repository = "https://github.com/SceneWorks/inference"
publish = false

[[bin]]
name = "mlx-llm-server"
path = "src/main.rs"

[dependencies]
# The engine + the backend-neutral contract it re-exports (`mlx_llm::core_llm`). The server composes
# mlx-llm's explicit provider catalog, then serves the selected provider through only the
# `core_llm::TextLlm` contract. Linking `mlx-llm` builds MLX, so this example is Apple-Silicon-only.
mlx-llm = { path = ".." }
# JSON request/response (OpenAI wire format). Derive keeps the request/response types readable.
serde = { version = "1", features = ["derive"] }
serde_json = "1"
